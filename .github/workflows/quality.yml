name: Code Quality

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-quality-${{ hashFiles('requirements.txt') }}

    - name: Install tools
      run: |
        python -m pip install --upgrade pip
        pip install black ruff mypy isort bandit

    - name: Check formatting with black
      run: black --check backend/ tests/

    - name: Check import sorting with isort
      run: isort --check-only --diff backend/ tests/

    - name: Lint with ruff
      run: ruff check backend/ tests/

    - name: Type check with mypy
      run: mypy backend/ --ignore-missing-imports

    - name: Security check with bandit
      run: bandit -r backend/ -c pyproject.toml 2>/dev/null || bandit -r backend/ -ll
