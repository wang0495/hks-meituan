# =============================================================================
# CityFlow Alertmanager 配置
# =============================================================================
# 告警通知路由：按严重程度和团队分流
# 支持通知渠道：邮件、Webhook（可扩展 Slack / 企业微信 / 钉钉）
# =============================================================================

global:
  # --- SMTP 配置（邮件通知）---
  smtp_smarthost: 'smtp.gmail.com:587'
  smtp_from: 'cityflow-alerts@example.com'
  smtp_auth_username: 'cityflow-alerts@example.com'
  smtp_auth_password: '${SMTP_PASSWORD}'
  smtp_require_tls: true

  # --- Resolve 超时 ---
  resolve_timeout: 5m

# =============================================================================
# 告警模板
# =============================================================================
templates:
  - '/etc/alertmanager/templates/*.tmpl'

# =============================================================================
# 告警路由
# =============================================================================
route:

  # 默认接收者（兜底）
  receiver: 'default-webhook'

  # 按 alertname 分组
  group_by: ['alertname', 'severity', 'team']

  # 等待 30s 再发送，合并同组告警
  group_wait: 30s

  # 同组告警间隔
  group_interval: 5m

  # 重复通知间隔
  repeat_interval: 4h

  # 子路由：按严重程度分流
  routes:

    # --- critical 告警：即时通知邮件 + Webhook ---
    - match:
        severity: critical
      receiver: 'critical-email'
      group_wait: 10s
      repeat_interval: 1h
      continue: false

    # --- warning 告警：邮件通知 ---
    - match:
        severity: warning
      receiver: 'warning-webhook'
      group_wait: 30s
      repeat_interval: 4h
      continue: false

    # --- info 告警：仅 Webhook 记录 ---
    - match:
        severity: info
      receiver: 'default-webhook'
      group_wait: 1m
      repeat_interval: 12h
      continue: false

    # --- 基础设施告警：单独通知 infra 团队 ---
    - match:
        team: infra
      receiver: 'infra-webhook'
      group_wait: 30s
      repeat_interval: 2h
      continue: true

# =============================================================================
# 告警抑制规则
# =============================================================================
inhibit_rules:

  # 如果实例已宕机（ServiceDown），抑制该实例的其他告警
  - source_match:
      alertname: ServiceDown
    target_match_re:
      alertname: '(HighErrorRate|HighLatencyP95|HighLatencyP99|EndpointHighErrorRate)'
    equal: ['instance']

  # critical 级别抑制同 alertname 的 warning 级别
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ['alertname', 'team']

  # CPU/内存/磁盘 critical 抑制对应的 warning
  - source_match:
      alertname: CriticalCPU
    target_match:
      alertname: HighCPU
    equal: ['instance']

  - source_match:
      alertname: CriticalMemory
    target_match:
      alertname: HighMemory
    equal: ['instance']

  - source_match:
      alertname: CriticalDisk
    target_match:
      alertname: HighDisk
    equal: ['instance']

# =============================================================================
# 接收者配置
# =============================================================================
receivers:

  # --- 默认 Webhook（兜底）---
  - name: 'default-webhook'
    webhook_configs:
      - url: 'http://cityflow-webhook-handler:5001/alerts'
        send_resolved: true
        http_config:
          follow_redirects: true

  # --- critical 告警邮件 ---
  - name: 'critical-email'
    email_configs:
      - to: 'oncall@cityflow.com'
        subject: '[CRITICAL] CityFlow: {{ .GroupLabels.alertname }}'
        body: |
          {{ range .Alerts }}
          ========================================
          告警: {{ .Annotations.summary }}
          严重程度: {{ .Labels.severity }}
          实例: {{ .Labels.instance }}
          ----------------------------------------
          详情: {{ .Annotations.description }}
          触发时间: {{ .StartsAt.Format "2006-01-02 15:04:05" }}
          当前状态: {{ .Status }}
          ========================================
          {{ end }}

          查看仪表盘: http://grafana:3000/d/cityflow-main
          告警管理: http://alertmanager:9093
    webhook_configs:
      - url: 'http://cityflow-webhook-handler:5001/alerts'
        send_resolved: true

  # --- warning 告警 Webhook ---
  - name: 'warning-webhook'
    webhook_configs:
      - url: 'http://cityflow-webhook-handler:5001/alerts'
        send_resolved: true
    email_configs:
      - to: 'backend-team@cityflow.com'
        subject: '[WARNING] CityFlow: {{ .GroupLabels.alertname }}'
        body: |
          {{ range .Alerts }}
          告警: {{ .Annotations.summary }}
          详情: {{ .Annotations.description }}
          实例: {{ .Labels.instance }}
          触发时间: {{ .StartsAt.Format "2006-01-02 15:04:05" }}
          {{ end }}

  # --- 基础设施告警 Webhook ---
  - name: 'infra-webhook'
    webhook_configs:
      - url: 'http://cityflow-webhook-handler:5001/alerts'
        send_resolved: true
    email_configs:
      - to: 'infra-team@cityflow.com'
        subject: '[INFRA] CityFlow: {{ .GroupLabels.alertname }}'
        body: |
          {{ range .Alerts }}
          告警: {{ .Annotations.summary }}
          详情: {{ .Annotations.description }}
          实例: {{ .Labels.instance }}
          团队: {{ .Labels.team }}
          触发时间: {{ .StartsAt.Format "2006-01-02 15:04:05" }}
          {{ end }}
