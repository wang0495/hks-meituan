# CityFlow Filebeat 日志收集配置
#
# 部署方式：
#   1. 安装 Filebeat: https://www.elastic.co/beats/filebeat
#   2. 将此文件复制到 /etc/filebeat/filebeat.yml
#   3. systemctl restart filebeat
#
# 前置条件：
#   - Elasticsearch 运行在 localhost:9200
#   - Kibana 运行在 localhost:5601

filebeat.inputs:
  - type: log
    enabled: true
    paths:
      - /var/log/cityflow/*.log
      - ./logs/*.log
    json.keys_under_root: true
    json.add_error_key: true
    fields:
      service: cityflow
    fields_under_root: true

# ---- 输出到 Elasticsearch ----
output.elasticsearch:
  hosts: ["localhost:9200"]
  index: "cityflow-%{+yyyy.MM.dd}"

# ---- Kibana 仪表盘 ----
setup.kibana:
  host: "localhost:5601"

# ---- 索引生命周期管理 ----
setup.ilm.enabled: false

# ---- 处理器：丢弃健康检查日志，降低噪音 ----
processors:
  - drop_event:
      when:
        and:
          - equals:
              level: "INFO"
          - contains:
              message: "health"
