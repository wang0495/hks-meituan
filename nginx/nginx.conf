# CityFlow Nginx 负载均衡配置

# 工作进程数（auto = 自动匹配 CPU 核数）
worker_processes auto;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'uht=$upstream_header_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 10m;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # -----------------------------------------------------------------------
    # 后端服务器组 -- least_conn 负载均衡
    # -----------------------------------------------------------------------
    upstream cityflow_backend {
        least_conn;

        server backend1:8000 weight=3 max_fails=3 fail_timeout=30s;
        server backend2:8000 weight=2 max_fails=3 fail_timeout=30s;
        server backend3:8000 weight=1 max_fails=3 fail_timeout=30s;

        # 保持长连接，减少 TCP 握手开销
        keepalive 32;
    }

    # -----------------------------------------------------------------------
    # 限流区域定义（放在 server 块外）
    # -----------------------------------------------------------------------
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=health_limit:10m rate=10r/s;

    # -----------------------------------------------------------------------
    # HTTP -> HTTPS 重定向
    # -----------------------------------------------------------------------
    server {
        listen 80;
        server_name cityflow.com;

        # Let's Encrypt 验证路径
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        return 301 https://$server_name$request_uri;
    }

    # -----------------------------------------------------------------------
    # HTTPS 主站
    # -----------------------------------------------------------------------
    server {
        listen 443 ssl http2;
        server_name cityflow.com;

        # ---- SSL 配置 ----
        ssl_certificate /etc/nginx/ssl/cityflow.crt;
        ssl_certificate_key /etc/nginx/ssl/cityflow.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # ---- 安全响应头 ----
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ---- API 路由 ----
        location /api/ {
            # 速率限制：每分钟 60 次，允许突发 20 次
            limit_req zone=api_limit burst=20 nodelay;

            # 反向代理到后端集群
            proxy_pass http://cityflow_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # 超时配置
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;

            # SSE 支持：禁用缓冲
            proxy_buffering off;
            proxy_cache off;

            # 后端健康检查（Nginx Plus 或 nginx_upstream_check_module）
            # 开源版本使用 max_fails / fail_timeout 实现被动健康检查
        }

        # ---- 健康检查端点（Nginx 自身） ----
        location /nginx-health {
            limit_req zone=health_limit burst=5 nodelay;
            access_log off;
            return 200 "OK";
            add_header Content-Type text/plain;
        }

        # ---- 前端静态文件 ----
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;

            # 静态资源缓存
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
                expires 7d;
                add_header Cache-Control "public, immutable";
            }

            # HTML 不缓存
            location ~* \.html$ {
                expires -1;
                add_header Cache-Control "no-store, no-cache, must-revalidate";
            }
        }
    }
}
