<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>L7 Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0f; color: #fff; font-family: sans-serif; }
    #map { width: 100vw; height: 100vh; }
    #log { position: fixed; bottom: 10px; left: 10px; background: rgba(0,0,0,0.85); padding: 8px; border-radius: 4px; font-size: 12px; max-width: 500px; max-height: 250px; overflow-y: auto; z-index: 9999; line-height: 1.6; }
    .ok { color: #6f6; }
    .err { color: #f66; }
    .info { color: #aaa; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="log">Loading...</div>

  <script src="https://cdn.jsdelivr.net/npm/@antv/l7@2.25.4/dist/l7.js"></script>
  <script>
    const log = document.getElementById('log');
    function append(msg, type) {
      log.innerHTML += `<div class="${type}">${msg}</div>`;
    }

    append('typeof L7: ' + typeof L7, 'info');
    append('L7 keys: ' + Object.keys(L7 || {}).join(', '), 'info');

    if (typeof L7 !== 'undefined') {
      append('GaodeMap: ' + typeof L7.GaodeMap, 'info');
      append('GaodeMapV2: ' + typeof L7.GaodeMapV2, 'info');
      append('Scene: ' + typeof L7.Scene, 'info');
      append('PointLayer: ' + typeof L7.PointLayer, 'info');
      append('Popup: ' + typeof L7.Popup, 'info');
      append('AMap on window: ' + typeof window.AMap, 'info');

      if (typeof L7.Scene !== 'undefined' && typeof L7.GaodeMap !== 'undefined') {
        try {
          append('Creating Scene...', 'info');
          const scene = new L7.Scene({
            id: 'map',
            map: new L7.GaodeMap({
              center: [113.55, 22.27],
              zoom: 11,
              pitch: 45,
              style: 'amap://styles/dark',
              key: 'e2a4f77a5b16efcf19b88a1e87ab88fd',
              securityJsCode: '8e6d3a6134d4516497913a5e295b5610',
            }),
          });

          append('Scene created, waiting for loaded...', 'info');

          scene.on('loaded', () => {
            append('Scene loaded!', 'ok');
            const testData = [
              { lng: 113.55, lat: 22.27, name: '测试点1', rating: 4.5, category: '餐饮' },
              { lng: 113.56, lat: 22.28, name: '测试点2', rating: 4.0, category: '购物' },
              { lng: 113.54, lat: 22.26, name: '测试点3', rating: 3.5, category: '酒店' },
            ];
            const colors = { '餐饮': '#FF8C00', '购物': '#FFD700', '酒店': '#4169E1' };
            const layer = new L7.PointLayer({})
              .source(testData, { parser: { type: 'json', x: 'lng', y: 'lat' } })
              .shape('cylinder')
              .size('rating', [10, 30])
              .color('category', colors)
              .style({ opacity: 0.85 });
            scene.addLayer(layer);
            append('Layer added!', 'ok');
          });

          scene.on('error', (e) => {
            append('Scene error: ' + (e.error || e.message || JSON.stringify(e)), 'err');
          });
        } catch (e) {
          append('Init error: ' + e.message, 'err');
          append('Stack: ' + (e.stack || '').split('\n')[1], 'err');
        }
      } else {
        append('Missing L7 exports - check CDN load', 'err');
      }
    } else {
      append('L7 is undefined - CDN failed to load', 'err');
    }
  </script>
</body>
</html>
