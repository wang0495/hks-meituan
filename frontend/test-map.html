<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>高德地图测试</title>
  <style>
    html, body, #map { margin:0; padding:0; width:100%; height:100%; }
  </style>
</head>
<body>
  <div id="map"></div>
  <script src="https://webapi.amap.com/loader.js"></script>
  <script>
    window._AMapSecurityConfig = {
      securityJsCode: '8e6d3a6134d4516497913a5e295b5610',
    };
    AMapLoader.load({
      key: 'e2a4f77a5b16efcf19b88a1e87ab88fd',
      version: '2.0',
    }).then((AMap) => {
      const map = new AMap.Map('map', {
        viewMode: '3D',
        zoom: 5,
        center: [112, 32],
        pitch: 45,
      });
      console.log('地图加载成功');
    }).catch((e) => {
      console.error('地图加载失败:', e);
      document.body.innerHTML = '<h1 style="color:red;padding:20px;">加载失败: ' + e.message + '</h1>';
    });
  </script>
</body>
</html>
