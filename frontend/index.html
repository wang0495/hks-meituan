<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CityFlow · 城市出行规划</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════════
   Atlas Nouveau — Design System
   Luxury cartography meets Art Nouveau
   ═══════════════════════════════════════════════════════════════ */
:root {
  --midnight: #0c1222;
  --ink: #1a2238;
  --paper: #f5f0e8;
  --paper-warm: #ede6d8;
  --cream: #faf7f2;
  --gold: #d4a853;
  --gold-light: rgba(212,168,83,0.15);
  --gold-glow: rgba(212,168,83,0.4);
  --coral: #e8614d;
  --coral-light: rgba(232,97,77,0.12);
  --teal: #3a8f8f;
  --teal-light: rgba(58,143,143,0.12);
  --plum: #7a5c8a;
  --plum-light: rgba(122,92,138,0.12);
  --text: #2a2a2a;
  --text-dim: #6b6560;
  --text-muted: #9a9389;
  --border: rgba(45,42,38,0.08);
  --border-gold: rgba(212,168,83,0.3);
  --shadow-sm: 0 1px 3px rgba(45,42,38,0.06);
  --shadow-md: 0 4px 16px rgba(45,42,38,0.08);
  --shadow-lg: 0 8px 32px rgba(45,42,38,0.12);
  --shadow-gold: 0 4px 20px rgba(212,168,83,0.15);
  --radius: 20px;
  --radius-sm: 12px;
  --radius-xs: 8px;
  --font-display: 'Playfair Display', Georgia, 'Noto Serif SC', serif;
  --font-body: 'DM Sans', 'Noto Sans SC', -apple-system, sans-serif;
  --font-mono: 'DM Mono', 'Menlo', monospace;
  --ease: cubic-bezier(0.22, 0.61, 0.36, 1);
  --ease-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-body);
  background: var(--paper);
  color: var(--text);
  font-size: 14px;
  line-height: 1.6;
  height: 100vh;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* Noise texture overlay */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  z-index: 0;
  opacity: 0.03;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  pointer-events: none;
}

/* ═══════════════════════════════════════════════════════════════
   Map Container
   ═══════════════════════════════════════════════════════════════ */
#mapContainer {
  position: fixed;
  inset: 0;
  z-index: 1;
}

/* Decorative map border */
#mapContainer::after {
  content: '';
  position: absolute;
  inset: 0;
  border: 3px solid var(--gold);
  border-radius: 0;
  pointer-events: none;
  z-index: 100;
  opacity: 0.15;
}

/* ═══════════════════════════════════════════════════════════════
   Unified Panel
   ═══════════════════════════════════════════════════════════════ */
.unified-panel {
  position: fixed;
  left: 20px; right: 20px; top: 20px; bottom: 20px;
  z-index: 10;
  pointer-events: none;
}

.up-inner {
  pointer-events: auto;
  height: 100%;
  display: flex;
  overflow: hidden;
}

.up-section {
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.up-left {
  width: 340px;
  flex-shrink: 0;
  border-right: 1px solid var(--border);
}

.up-center {
  flex: 1;
  min-width: 0;
  border-right: 1px solid var(--border);
}

.up-right {
  width: 260px;
  flex-shrink: 0;
}

.panel {
  background: var(--cream);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow-lg);
  pointer-events: auto;
  overflow: hidden;
  position: relative;
}

/* Art Nouveau decorative top border */
.panel::before {
  content: '';
  position: absolute;
  top: 0; left: 20px; right: 20px;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  z-index: 1;
}

/* ── Input Header ── */
.input-header {
  display: flex; align-items: center; gap: 14px; margin-bottom: 20px;
}

.logo-mark {
  width: 44px; height: 44px;
  position: relative;
  display: flex; align-items: center; justify-content: center;
}

.logo-mark svg {
  width: 44px; height: 44px;
}

.logo-mark::after {
  content: '';
  position: absolute;
  inset: -4px;
  border: 1.5px solid var(--gold);
  border-radius: 50%;
  opacity: 0.3;
}

.brand-text h1 {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 900;
  letter-spacing: -0.02em;
  color: var(--ink);
  line-height: 1.1;
}

.brand-text .tagline {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-muted);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-top: 2px;
}

.badge {
  margin-left: auto;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--gold);
  padding: 4px 10px;
  border: 1px solid var(--border-gold);
  border-radius: 20px;
  letter-spacing: 0.08em;
}

/* Search Box */
.search-wrap {
  position: relative;
  margin-bottom: 14px;
}

.search-wrap input {
  width: 100%;
  padding: 14px 50px 14px 18px;
  background: var(--paper);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 14px;
  outline: none;
  transition: all 0.3s var(--ease);
}

.search-wrap input:focus {
  border-color: var(--gold);
  box-shadow: 0 0 0 4px var(--gold-light);
  background: #fff;
}

.search-wrap input::placeholder {
  color: var(--text-muted);
  font-style: italic;
}

.search-wrap .send-btn {
  position: absolute;
  right: 6px; top: 50%;
  transform: translateY(-50%);
  width: 38px; height: 38px;
  border-radius: 10px;
  border: none;
  background: var(--ink);
  color: var(--gold);
  font-size: 18px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.25s var(--ease);
  font-family: var(--font-display);
}

.search-wrap .send-btn:hover {
  background: var(--gold);
  color: var(--ink);
  transform: translateY(-50%) scale(1.05);
  box-shadow: var(--shadow-gold);
}

.search-wrap .send-btn:disabled {
  opacity: 0.3;
  cursor: not-allowed;
  transform: none;
}

/* Quick Tags */
.quick-tags { display: flex; flex-wrap: wrap; gap: 6px; }

.quick-tag {
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-dim);
  font-size: 12px;
  font-family: var(--font-body);
  cursor: pointer;
  transition: all 0.25s var(--ease);
  white-space: nowrap;
}

.quick-tag:hover {
  border-color: var(--gold);
  color: var(--gold);
  background: var(--gold-light);
  transform: translateY(-1px);
}

/* ── Route Panel ── */
.route-header {
  padding: 18px 24px 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}

.route-header h2 {
  font-family: var(--font-display);
  font-size: 16px;
  font-weight: 700;
  color: var(--ink);
  display: flex;
  align-items: center;
  gap: 8px;
}

.day-switch { display: flex; gap: 4px; }

.day-btn {
  width: 30px; height: 30px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-dim);
  font-size: 12px;
  font-weight: 700;
  font-family: var(--font-mono);
  cursor: pointer;
  transition: all 0.2s;
}

.day-btn.active {
  background: var(--ink);
  border-color: var(--ink);
  color: var(--gold);
}

.route-steps {
  flex: 1;
  overflow-y: auto;
  padding: 14px 16px;
}

.route-steps::-webkit-scrollbar { width: 3px; }
.route-steps::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Step Card */
.step-card {
  display: flex;
  gap: 14px;
  padding: 14px;
  border-radius: var(--radius-sm);
  margin-bottom: 6px;
  background: transparent;
  border: 1px solid transparent;
  cursor: pointer;
  transition: all 0.3s var(--ease);
  position: relative;
  animation: stepReveal 0.5s var(--ease) backwards;
}

@keyframes stepReveal {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

.step-card:hover {
  background: var(--paper);
  border-color: var(--border);
  transform: translateX(6px);
}

.step-card.active {
  background: var(--gold-light);
  border-color: var(--border-gold);
}

.step-num {
  width: 34px; height: 34px;
  border-radius: 50%;
  background: var(--ink);
  color: var(--gold);
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  position: relative;
}

.step-num::after {
  content: '';
  position: absolute;
  inset: -3px;
  border: 1px solid var(--gold);
  border-radius: 50%;
  opacity: 0.2;
}

.step-content { flex: 1; min-width: 0; }

.step-name {
  font-family: var(--font-display);
  font-size: 15px;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.step-meta {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 11px;
  color: var(--text-muted);
}

.step-time {
  color: var(--gold);
  font-weight: 600;
  font-family: var(--font-mono);
}

.step-category {
  padding: 1px 8px;
  border-radius: 10px;
  background: var(--paper-warm);
  font-size: 10px;
  color: var(--text-dim);
}

.step-narrative {
  font-size: 12px;
  color: var(--text-dim);
  margin-top: 6px;
  line-height: 1.5;
  font-style: italic;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.step-connector {
  width: 1px;
  height: 14px;
  background: linear-gradient(to bottom, var(--gold), transparent);
  margin-left: 33px;
  opacity: 0.3;
}

/* Stats Bar */
.stats-bar {
  display: flex;
  gap: 0;
  padding: 0;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}

.stat-item {
  flex: 1;
  text-align: center;
  padding: 14px 8px;
  border-right: 1px solid var(--border);
}

.stat-item:last-child { border-right: none; }

.stat-value {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 900;
  color: var(--ink);
  line-height: 1;
}

.stat-label {
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  margin-top: 4px;
}

/* Narrative */
.narrative-section {
  padding: 16px 20px;
  border-top: 1px solid var(--border);
}

.narrative-section .opening {
  font-family: var(--font-display);
  font-size: 14px;
  font-style: italic;
  color: var(--text-dim);
  line-height: 1.7;
}

.narrative-section .closing {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 10px;
  line-height: 1.6;
}

/* Emotion Curve */
.emotion-section {
  padding: 14px 20px;
  border-top: 1px solid var(--border);
}

.emotion-section h3 {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 500;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  margin-bottom: 10px;
}

#emotionCanvas {
  width: 100%;
  height: 60px;
  border-radius: var(--radius-xs);
}

/* Empty State */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 48px 24px;
  text-align: center;
}

.empty-state .icon {
  width: 64px; height: 64px;
  margin-bottom: 16px;
  opacity: 0.15;
}

.empty-state p {
  font-family: var(--font-display);
  font-size: 14px;
  font-style: italic;
  color: var(--text-muted);
  line-height: 1.8;
}

/* ═══════════════════════════════════════════════════════════════
   Unified Panel — Inner Sections
   ═══════════════════════════════════════════════════════════════ */
.up-input {
  padding: 20px 20px 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.up-chat {
  flex: 1;
  min-height: 0;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.up-right .agent-header {
  border-bottom: 1px solid var(--border);
}

.agent-header {
  padding: 16px 18px 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
}

.agent-header h2 {
  font-family: var(--font-display);
  font-size: 15px;
  font-weight: 700;
  color: var(--ink);
}

.status-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--text-muted);
  transition: all 0.4s;
}

.status-dot.active {
  background: var(--coral);
  box-shadow: 0 0 8px var(--coral);
  animation: dotPulse 1.5s infinite;
}

@keyframes dotPulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.6; transform: scale(1.3); }
}

.agent-body {
  padding: 12px 14px;
  overflow-y: auto;
  max-height: calc(100vh - 120px);
}

.agent-body::-webkit-scrollbar { width: 3px; }
.agent-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Architecture Diagram — compact */
.arch-diagram {
  display: flex;
  flex-direction: column;
  gap: 0;
  margin-bottom: 0;
}

.wave-row {
  display: flex;
  align-items: center;
  gap: 0;
  padding: 4px 0;
  position: relative;
}

.wave-label {
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 600;
  color: var(--gold);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  width: 54px;
  flex-shrink: 0;
  text-align: right;
  padding-right: 8px;
}

.wave-nodes {
  display: flex;
  gap: 4px;
  flex: 1;
  justify-content: center;
}

.arch-node {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  background: var(--paper);
  border: 1.5px solid var(--border);
  transition: all 0.4s var(--ease);
  cursor: default;
  position: relative;
}

.arch-node.active {
  background: var(--gold);
  border-color: var(--gold);
  box-shadow: 0 0 12px var(--gold-glow);
  transform: scale(1.15);
  z-index: 2;
}

.arch-node.done {
  background: var(--teal);
  border-color: var(--teal);
  color: #fff;
}

/* Connector lines between waves */
.wave-connector {
  width: 1.5px;
  height: 6px;
  background: linear-gradient(to bottom, var(--gold), transparent);
  margin-left: 62px;
  opacity: 0.4;
}

/* Agent Flow */
.agent-flow {
  display: flex;
  flex-direction: column;
  gap: 2px;
  margin-top: 8px;
}

.agent-step {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 10px;
  border-radius: var(--radius-xs);
  background: transparent;
  border: 1px solid transparent;
  transition: all 0.3s var(--ease);
}

.agent-step.active {
  background: var(--gold-light);
  border-color: var(--border-gold);
}

.agent-step.done { opacity: 0.45; }

.agent-step .step-icon {
  width: 20px; height: 20px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px;
  flex-shrink: 0;
  background: var(--paper-warm);
  color: var(--text-dim);
  transition: all 0.3s;
}

.agent-step.active .step-icon {
  background: var(--ink);
  color: var(--gold);
}

.agent-step.done .step-icon {
  background: var(--teal);
  color: #fff;
}

.agent-step .step-label {
  font-size: 12px;
  font-weight: 500;
  color: var(--text);
}

.agent-step .step-status {
  margin-left: auto;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-muted);
  white-space: nowrap;
}

/* ═══════════════════════════════════════════════════════════════
   Chat Messages
   ═══════════════════════════════════════════════════════════════ */
.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 14px 16px;
}

.chat-messages::-webkit-scrollbar { width: 3px; }
.chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.chat-msg {
  padding: 10px 14px;
  border-radius: var(--radius-xs);
  margin-bottom: 8px;
  font-size: 13px;
  line-height: 1.5;
  animation: chatSlide 0.35s var(--ease);
}

@keyframes chatSlide {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.chat-msg.system {
  background: var(--paper);
  border: 1px solid var(--border);
  color: var(--text-dim);
}

.chat-msg.user {
  background: var(--ink);
  color: var(--paper);
  margin-left: 40px;
  border: none;
}

.chat-msg .msg-label {
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 500;
  color: var(--gold);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  margin-bottom: 4px;
}

.chat-msg.user .msg-label { color: var(--gold); }

/* ═══════════════════════════════════════════════════════════════
   Typing Indicator (in chat)
   ═══════════════════════════════════════════════════════════════ */
.typing-indicator {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  border-radius: var(--radius-xs);
  background: var(--paper);
  border: 1px solid var(--border);
  margin-bottom: 8px;
  animation: chatSlide 0.35s var(--ease);
}

.typing-indicator .dots {
  display: flex;
  gap: 4px;
}

.typing-indicator .dots span {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--gold);
  animation: dotBounce 1.2s infinite;
}

.typing-indicator .dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator .dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes dotBounce {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30% { transform: translateY(-6px); opacity: 1; }
}

.typing-indicator .typing-text {
  font-size: 12px;
  color: var(--text-dim);
  font-style: italic;
}

/* ═══════════════════════════════════════════════════════════════
   Center Agent Display
   ═══════════════════════════════════════════════════════════════ */
/* Agent card in chat */
.chat-agent-card {
  background: var(--paper);
  border: 1px solid var(--gold-light);
  border-left: 3px solid var(--gold);
  border-radius: var(--radius-xs);
  padding: 14px 16px;
  margin-bottom: 8px;
  animation: fadeSlideIn 0.3s var(--ease);
}
.chat-agent-card .agent-head {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}
.chat-agent-card .agent-icon {
  font-size: 28px;
  line-height: 1;
}
.chat-agent-card .agent-name {
  font-family: var(--font-display);
  font-size: 16px;
  font-weight: 700;
  color: var(--ink);
}
.chat-agent-card .agent-duty {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--gold);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.chat-agent-card .agent-detail {
  display: flex;
  gap: 8px;
  margin-bottom: 6px;
  font-size: 12px;
  line-height: 1.5;
}
.chat-agent-card .agent-detail .lbl {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 600;
  color: var(--gold);
  min-width: 36px;
  flex-shrink: 0;
  padding-top: 1px;
}
.chat-agent-card .agent-detail .val {
  color: var(--text-dim);
}
.chat-agent-card .agent-badge {
  display: inline-flex;

<script>
// ═══════════════════════════════════════════════════════════════
// CityFlow — Atlas Nouveau Edition
// ═══════════════════════════════════════════════════════════════

const API_BASE = window.location.origin;

const state = {
  steps: [], currentDay: 1, totalDays: 1,
  multiRoutes: [], routeId: null, isPlanning: false,
  canvas: null,
};

function fillInput(t) {
  document.getElementById('userInput').value = t;
  document.getElementById('userInput').focus();
}

// ── 地图初始化 (Canvas only) ──
function initMap() {
  initCanvasMap();
}

// ── Canvas fallback map ──
function initCanvasMap() {
  const container = document.getElementById('mapContainer');
  container.style.background = '#1a2238';
  const canvas = document.createElement('canvas');
  canvas.id = 'mapCanvas';
  canvas.style.cssText = 'width:100%;height:100%;display:block;';
  container.innerHTML = '';
  container.appendChild(canvas);

  // Draw grid background
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;

  function resize() {
    canvas.width = container.offsetWidth * dpr;
    canvas.height = container.offsetHeight * dpr;
    ctx.scale(dpr, dpr);
    drawGrid();
  }

  function drawGrid() {
    const w = container.offsetWidth;
    const h = container.offsetHeight;
    ctx.clearRect(0, 0, w, h);
    // Dark background
    ctx.fillStyle = '#1a2238';
    ctx.fillRect(0, 0, w, h);
    // Grid lines
    ctx.strokeStyle = 'rgba(212,168,83,0.06)';
    ctx.lineWidth = 1;
    const step = 40;
    for (let x = 0; x < w; x += step) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke(); }
    for (let y = 0; y < h; y += step) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke(); }
    // Title
    ctx.fillStyle = 'rgba(212,168,83,0.15)';
    ctx.font = 'italic 16px "Playfair Display", serif';
    ctx.textAlign = 'center';
    ctx.fillText('Zhuhai · 22.27°N 113.55°E', w / 2, h / 2 - 10);
    ctx.font = '11px "DM Mono", monospace';
    ctx.fillText('等待路线数据...', w / 2, h / 2 + 14);
  }

  window.addEventListener('resize', resize);
  resize();
}

// ── Route Rendering (Canvas) ──
function clearRoute() {
  drawRouteOnCanvas([]);
}

function drawRouteOnCanvas(valid) {
  const canvas = document.getElementById('mapCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.width / dpr;
  const h = canvas.height / dpr;
  const container = document.getElementById('mapContainer');

  // Redraw grid
  ctx.clearRect(0, 0, w, h);
  ctx.fillStyle = '#1a2238';
  ctx.fillRect(0, 0, w, h);
  ctx.strokeStyle = 'rgba(212,168,83,0.04)';
  ctx.lineWidth = 1;
  const step = 40;
  for (let x = 0; x < w; x += step) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke(); }
  for (let y = 0; y < h; y += step) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke(); }

  if (!valid.length) return;

  // Compute bounds
  const lngs = valid.map(s => s.poi.lng);
  const lats = valid.map(s => s.poi.lat);
  const minLng = Math.min(...lngs), maxLng = Math.max(...lngs);
  const minLat = Math.min(...lats), maxLat = Math.max(...lats);
  const pad = 80;
  const rangeLng = maxLng - minLng || 0.01;
  const rangeLat = maxLat - minLat || 0.01;
  const scale = Math.min((w - pad * 2) / rangeLng, (h - pad * 2) / rangeLat);
  const cx = (minLng + maxLng) / 2;
  const cy = (minLat + maxLat) / 2;

  function toXY(lng, lat) {
    return [w / 2 + (lng - cx) * scale, h / 2 - (lat - cy) * scale];
  }

  // Draw dashed line
  ctx.setLineDash([10, 6]);
  ctx.strokeStyle = '#d4a853';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  valid.forEach((s, i) => {
    const [x, y] = toXY(s.poi.lng, s.poi.lat);
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  });
  ctx.stroke();
  ctx.setLineDash([]);

  // Draw arrows between points
  for (let i = 0; i < valid.length - 1; i++) {
    const [x1, y1] = toXY(valid[i].poi.lng, valid[i].poi.lat);
    const [x2, y2] = toXY(valid[i + 1].poi.lng, valid[i + 1].poi.lat);
    const mx = (x1 + x2) / 2, my = (y1 + y2) / 2;
    const angle = Math.atan2(y2 - y1, x2 - x1);
    ctx.save();
    ctx.translate(mx, my);
    ctx.rotate(angle);
    ctx.fillStyle = '#e8614d';
    ctx.beginPath();
    ctx.moveTo(8, 0);
    ctx.lineTo(-4, -5);
    ctx.lineTo(-4, 5);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  // Draw numbered markers
  valid.forEach((s, i) => {
    const [x, y] = toXY(s.poi.lng, s.poi.lat);
    // Glow
    const grad = ctx.createRadialGradient(x, y, 0, x, y, 18);
    grad.addColorStop(0, 'rgba(212,168,83,0.3)');
    grad.addColorStop(1, 'rgba(212,168,83,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(x, y, 18, 0, Math.PI * 2);
    ctx.fill();
    // Circle
    ctx.fillStyle = '#1a2238';
    ctx.strokeStyle = '#d4a853';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(x, y, 14, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    // Number
    ctx.fillStyle = '#d4a853';
    ctx.font = 'bold 12px "DM Mono", monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(String(i + 1), x, y);
    // Name label
    ctx.fillStyle = 'rgba(245,240,232,0.8)';
    ctx.font = '11px "DM Sans", sans-serif';
    ctx.fillText(s.poi.name || '', x, y - 22);
  });
}

function renderRouteOnMap(steps) {
  const valid = steps.filter(s => s.poi && s.poi.lng && s.poi.lat);
  if (!valid.length) return;
  drawRouteOnCanvas(valid);
}

// ── Step Cards ──
let lastRenderedStep = -1;

function renderSteps(steps) {
  const c = document.getElementById('routeSteps');
  if (!steps.length) {
    c.innerHTML = '<div class="empty-state"><svg class="icon" viewBox="0 0 64 64" fill="none"><circle cx="32" cy="32" r="28" stroke="#d4a853" stroke-width="1"/><path d="M32 12 L32 52 M18 22 L32 12 L46 22" stroke="#d4a853" stroke-width="1" stroke-linecap="round"/></svg><p>暂无路线数据</p></div>';
    lastRenderedStep = -1;
    return;
  }
  // Only append new steps (incremental)
  if (lastRenderedStep < 0) {
    // Full render on first call
    c.innerHTML = '';
  }
  for (let i = lastRenderedStep + 1; i < steps.length; i++) {
    const step = steps[i];
    const poi = step.poi || {};
    const card = document.createElement('div');
    card.className = 'step-card';
    card.style.animationDelay = '0s';
    card.onclick = () => focusStep(i);
    card.innerHTML = `
      <div class="step-num">${i+1}</div>
      <div class="step-content">
        <div class="step-name">${esc(poi.name || `站点 ${i+1}`)}</div>
        <div class="step-meta">
          ${step.arrival_time ? `<span class="step-time">${step.arrival_time}</span>` : ''}
          ${poi.category ? `<span class="step-category">${esc(poi.category)}</span>` : ''}
        </div>
        ${step.narrative ? `<div class="step-narrative">${esc(step.narrative)}</div>` : ''}
      </div>`;
    if (i > 0) {
      const conn = document.createElement('div');
      conn.className = 'step-connector';
      c.appendChild(conn);
    }
    c.appendChild(card);
  }
  lastRenderedStep = steps.length - 1;
  // Scroll to bottom of route steps
  c.scrollTop = c.scrollHeight;
}

function focusStep(i) {
  // Canvas map — redraw with highlighted marker
  drawRouteOnCanvas(state.steps.filter(s => s.poi && s.poi.lng && s.poi.lat));
}

// ── Day Switch ──
function renderDaySwitch(total, cur) {
  const c = document.getElementById('daySwitch');
  if (total <= 1) { c.innerHTML = ''; return; }
  c.innerHTML = Array.from({length: total}, (_, i) =>
    `<button class="day-btn ${i+1===cur?'active':''}" onclick="switchDay(${i+1})">${i+1}</button>`
  ).join('');
}

function switchDay(d) {
  state.currentDay = d;
  const r = state.multiRoutes[d-1];
  if (r) {
    state.steps = r.route || r.steps || [];
    renderSteps(state.steps);
    renderRouteOnMap(state.steps);
    renderDaySwitch(state.totalDays, d);
  }
}

// ── Stats ──
function renderStats(steps) {
  const bar = document.getElementById('statsBar');
  if (!steps.length) { bar.classList.add('hidden'); return; }
  bar.classList.remove('hidden');
  document.getElementById('statSteps').textContent = steps.length;
  const f = steps[0].arrival_time, l = steps[steps.length-1].departure_time;
  if (f && l) {
    const [fh,fm] = f.split(':').map(Number), [lh,lm] = l.split(':').map(Number);
    document.getElementById('statTime').textContent = ((lh*60+lm-fh*60-fm)/60).toFixed(1)+'h';
  }
}

// ── Narrative ──
function renderNarrative(n) {
  const s = document.getElementById('narrativeSection');
  if (!n) { s.classList.add('hidden'); return; }
  s.classList.remove('hidden');
  document.getElementById('narrativeOpening').textContent = n.opening || '';
  document.getElementById('narrativeClosing').textContent = n.closing || '';
}

// ── Emotion Curve ──
function renderEmotionCurve(curve) {
  const s = document.getElementById('emotionSection');
  if (!curve?.length) { s.classList.add('hidden'); return; }
  s.classList.remove('hidden');
  const canvas = document.getElementById('emotionCanvas');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  canvas.width = canvas.offsetWidth * dpr;
  canvas.height = 60 * dpr;
  ctx.scale(dpr, dpr);
  const w = canvas.offsetWidth, h = 60;
  const pad = {top:8,right:8,bottom:8,left:8};
  const pw = w-pad.left-pad.right, ph = h-pad.top-pad.bottom;
  ctx.clearRect(0,0,w,h);
  [{key:'excitement',color:'#e8614d'},{key:'tranquility',color:'#3a8f8f'},{key:'culture_depth',color:'#7a5c8a'}].forEach(em => {
    ctx.beginPath(); ctx.strokeStyle = em.color; ctx.lineWidth = 2;
    let started = false;
    curve.forEach((pt,i) => {
      const x = pad.left + (i/(curve.length-1))*pw;
      const y = pad.top + ph*(1-(pt[em.key]||0));
      if (!started) { ctx.moveTo(x,y); started=true; } else ctx.lineTo(x,y);
    });
    ctx.stroke();
  });
}

// ── Chat ──
function addChatMsg(text, type='system') {
  const c = document.getElementById('chatMessages');
  const m = document.createElement('div');
  m.className = `chat-msg ${type}`;
  m.innerHTML = `<div class="msg-label">${type==='system'?'CityFlow':'You'}</div>${esc(text)}`;
  c.appendChild(m);
  c.scrollTop = c.scrollHeight;
}

// ═══════════════════════════════════════════════════════════════
// Agent Pipeline
// ═══════════════════════════════════════════════════════════════
const AGENTS = [
  { id:'rule_guard',    name:'规则守卫',   icon:'🛡', wave:1 },
  { id:'expert_router', name:'场景路由',   icon:'🧭', wave:1 },
  { id:'poi',           name:'景点专家',   icon:'🏛', wave:2 },
  { id:'food',          name:'美食专家',   icon:'🍜', wave:2 },
  { id:'weather',       name:'天气评估',   icon:'🌤', wave:2 },
  { id:'destination',   name:'目的地专家', icon:'📍', wave:2 },
  { id:'traffic',       name:'交通专家',   icon:'🚗', wave:3 },
  { id:'hotel',         name:'住宿专家',   icon:'🏨', wave:3 },
  { id:'local_expert',  name:'本地达人',   icon:'🏘', wave:3 },
  { id:'review',        name:'路线审查',   icon:'🔍', wave:4 },
  { id:'synthesizer',   name:'路线合成',   icon:'✨', wave:5 },
];

function initAgentPanel() {
  const diagram = document.getElementById('archDiagram');
  const flow = document.getElementById('agentFlow');
  diagram.innerHTML = '';

  const waves = [
    { label:'W1', agents:['rule_guard','expert_router'] },
    { label:'W2', agents:['poi','food','weather','destination'] },
    { label:'W3', agents:['traffic','hotel','local_expert'] },
    { label:'W4', agents:['review'] },
    { label:'W5', agents:['synthesizer'] },
  ];

  waves.forEach((w, wi) => {
    // Connector between waves
    if (wi > 0) {
      const conn = document.createElement('div');
      conn.className = 'wave-connector';
      diagram.appendChild(conn);
    }

    const row = document.createElement('div');
    row.className = 'wave-row';

    const lbl = document.createElement('div');
    lbl.className = 'wave-label';
    lbl.textContent = w.label;
    row.appendChild(lbl);

    const nodes = document.createElement('div');
    nodes.className = 'wave-nodes';

    w.agents.forEach(aid => {
      const def = AGENTS.find(a=>a.id===aid);
      const node = document.createElement('div');
      node.className = 'arch-node';
      node.id = `arch-${aid}`;
      node.textContent = def?.icon||'?';
      node.title = def?.name||aid;
      nodes.appendChild(node);
    });

    row.appendChild(nodes);
    diagram.appendChild(row);
  });

  flow.innerHTML = AGENTS.map(d => `
    <div class="agent-step" id="flow-${d.id}">
      <div class="step-icon">${d.icon}</div>
      <span class="step-label">${d.name}</span>
      <span class="step-status">等待中</span>
    </div>
  `).join('');
}

function setAgentState(id, st) {
  const f = document.getElementById(`flow-${id}`);
  const a = document.getElementById(`arch-${id}`);
  if (f) {
    f.className = `agent-step ${st}`;
    const s = f.querySelector('.step-status');
    if (s) s.textContent = {active:'运行中...',done:'✓ 完成',error:'✗ 失败'}[st]||'等待中';
  }
  if (a) a.className = `arch-node ${st}`;
  if (st==='active') document.getElementById('agentStatusDot').classList.add('active');
}

function resetAgents() {
  AGENTS.forEach(d => setAgentState(d.id, ''));
  document.getElementById('agentStatusDot').classList.remove('active');
  hideCenterAgent();
}

// ── Agent Card in Chat ──
const AGENT_DUTIES = {
  rule_guard:    '意图解析 + POI加载',
  expert_router: '场景分类 + 专家调度',
  poi:           '景点筛选与推荐',
  food:          '餐饮推荐',
  weather:       '天气评估',
  destination:   '目的地分析',
  traffic:       '交通方案规划',
  hotel:         '住宿推荐',
  local_expert:  '本地特色挖掘',
  review:        '路线质量审查',
  synthesizer:   '路线组装与排序',
};

const agentCards = new Map(); // agentId → card element

function showCenterAgent(agentId, text) {
  const def = AGENTS.find(a => a.id === agentId);
  if (!def) return;
  const c = document.getElementById('chatMessages');
  const card = document.createElement('div');
  card.className = 'chat-agent-card';
  card.dataset.agent = agentId;
  card.innerHTML = `
    <div class="agent-head">
      <span class="agent-icon">${def.icon}</span>
      <div>
        <div class="agent-name">${esc(def.name)}</div>
        <div class="agent-duty">${esc(AGENT_DUTIES[agentId] || '')}</div>
      </div>
    </div>
    <div class="agent-detail"><span class="lbl">在做</span><span class="val agent-doing">${esc(text || '正在分析中...')}</span></div>
    <div class="agent-detail"><span class="lbl">结果</span><span class="val agent-result">—</span></div>
    <div class="agent-badge"><span class="dot"></span>工作中</div>
  `;
  c.appendChild(card);
  c.scrollTop = c.scrollHeight;
  agentCards.set(agentId, card);
}

function updateAgentDoing(agentId, text) {
  const card = agentCards.get(agentId);
  if (card) {
    card.querySelector('.agent-doing').textContent = text || '工作中...';
    const c = document.getElementById('chatMessages');
    c.scrollTop = c.scrollHeight;
  }
}

function hideCenterAgent() {
  agentCards.clear();
}

function completeCenterAgent(agentId, summary) {
  const card = agentCards.get(agentId);
  if (!card) return;
  card.classList.add('done');
  card.querySelector('.agent-result').textContent = summary || '完成';
  card.querySelector('.agent-badge').innerHTML = '✓ 完成';
  const c = document.getElementById('chatMessages');
  c.scrollTop = c.scrollHeight;
  agentCards.delete(agentId);
}

// ── Typing Indicator ──
let typingEl = null;

function showTyping(text) {
  if (typingEl) typingEl.remove();
  const c = document.getElementById('chatMessages');
  typingEl = document.createElement('div');
  typingEl.className = 'typing-indicator';
  typingEl.innerHTML = `<div class="dots"><span></span><span></span><span></span></div><span class="typing-text">${text}</span>`;
  c.appendChild(typingEl);
  c.scrollTop = c.scrollHeight;
}

function updateTyping(text) {
  if (!typingEl) { showTyping(text); return; }
  const t = typingEl.querySelector('.typing-text');
  if (t) t.textContent = text;
}

function hideTyping() {
  if (typingEl) { typingEl.remove(); typingEl = null; }
}

// ── SSE Handler ──
function handleSSE(type, data) {
  switch(type) {
    case 'chat': hideTyping(); addChatMsg(data.text, 'system'); break;
    case 'phase': updateTyping(data.message||'处理中...'); break;
    case 'agent_start':
      setAgentState(data.agent, 'active');
      updateTyping(data.text || `${AGENTS.find(a=>a.id===data.agent)?.name || data.agent} 正在工作...`);
      showCenterAgent(data.agent, data.text || '正在分析中...');
      break;
    case 'agent_result':
      setAgentState(data.agent, 'done');
      updateTyping(data.summary || `${AGENTS.find(a=>a.id===data.agent)?.name || data.agent} 完成 ✓`);
      completeCenterAgent(data.agent, data.summary);
      break;
    case 'step':
      hideTyping();
      state.steps.push(data);
      renderSteps(state.steps);
      if (data.poi?.lng) renderRouteOnMap(state.steps);
      break;
    case 'day_start': state.currentDay=data.day; state.steps=[]; lastRenderedStep=-1; break;
    case 'day_end': break;
    case 'done':
      hideTyping();
      state.routeId = data.route_id;
      if (data.full_route) {
        if (data.full_route.days) {
          state.multiRoutes = data.full_route.days;
          state.totalDays = data.full_route.days.length;
          renderDaySwitch(state.totalDays, 1);
          const fd = state.multiRoutes[0];
          if (fd) { state.steps = fd.route||fd.steps||[]; renderSteps(state.steps); renderRouteOnMap(state.steps); }
        } else {
          state.steps = data.full_route.route||[];
          renderSteps(state.steps);
          renderRouteOnMap(state.steps);
          renderNarrative(data.full_route.narrative);
          renderEmotionCurve(data.full_route.emotion_curve);
        }
      }
      renderStats(state.steps);
      state.isPlanning = false;
      document.getElementById('sendBtn').disabled = false;
      addChatMsg(`✅ 路线规划完成！共 ${state.steps.length} 站`);
      break;
    case 'error':
      hideTyping();
      addChatMsg('❌ ' + (data.error||'规划失败'));
      state.isPlanning = false;
      document.getElementById('sendBtn').disabled = false;
      break;
  }
}

// ── Submit Plan ──
async function submitPlan() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text || state.isPlanning) return;

  state.isPlanning = true;
  document.getElementById('sendBtn').disabled = true;
  state.steps=[]; state.multiRoutes=[]; state.currentDay=1; state.totalDays=1;
  lastRenderedStep = -1;
  resetAgents(); clearRoute();
  document.getElementById('routeSteps').innerHTML='';
  document.getElementById('statsBar').classList.add('hidden');
  document.getElementById('narrativeSection').classList.add('hidden');
  document.getElementById('emotionSection').classList.add('hidden');
  document.getElementById('daySwitch').innerHTML='';

  addChatMsg(text, 'user');
  showTyping('正在连接智能体...');

  let heartbeat = null;
  try {
    const resp = await fetch(`${API_BASE}/api/plan`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({user_input:text}),
    });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';
    let lastEventTime = Date.now();
    // Heartbeat: show "still working" if no events for 15s
    heartbeat = setInterval(() => {
      if (Date.now() - lastEventTime > 15000 && state.isPlanning) {
        const msgs = ['智能体还在努力中...', '路线计算比较复杂，请稍候...', '正在深度分析你的需求...'];
        showTyping(msgs[Math.floor(Math.random() * msgs.length)]);
        lastEventTime = Date.now();
      }
    }, 5000);
    while(true) {
      const {done, value} = await reader.read();
      if (done) break;
      lastEventTime = Date.now();
      buf += decoder.decode(value, {stream:true});
      const lines = buf.split('\n');
      buf = lines.pop()||'';
      let evtType = '';
      for (const line of lines) {
        if (line.startsWith('event: ')) evtType = line.slice(7).trim();
        else if (line.startsWith('data: ')) {
          try { handleSSE(evtType, JSON.parse(line.slice(6))); } catch(e) {}
        }
      }
    }
  } catch(err) {
    addChatMsg('❌ 连接失败: '+err.message);
  } finally {
    if (heartbeat) clearInterval(heartbeat);
    hideTyping();
    state.isPlanning = false;
    document.getElementById('sendBtn').disabled = false;
  }
}

function showLoading(t) { showTyping(t||'正在连接智能体...'); }
function hideLoading() { hideTyping(); }
function esc(s) { const e=document.createElement('span'); e.textContent=s||''; return e.innerHTML; }

// ── Init ──
document.addEventListener('DOMContentLoaded', async () => {
  initAgentPanel();
  try {
    initMap();
  } catch(e) {
    console.error('[CityFlow] Map init failed:', e);
  }
  document.getElementById('userInput').addEventListener('keydown', e => {
    if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); submitPlan(); }
  });
});
</script>
