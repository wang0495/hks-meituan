<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CityFlow · 智能城市漫游</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;700;900&display=swap');

    :root {
      color-scheme: dark;
      --bg: #08090f;
      --surface: #10131c;
      --surface2: #161a28;
      --glass: rgba(255,255,255,.03);
      --line: rgba(255,255,255,.06);
      --text: #e8ecf4;
      --text2: #b4bdd4;
      --text3: #6a7494;
      --accent: #7b6cf6;
      --accent2: #5ea2ff;
      --green: #3ee889;
      --red: #ff4d6a;
      --orange: #ffa54d;
      --pink: #ff6b9d;
      --purple: #9b6dff;
      --cyan: #4dd8e8;
      --R: 12px;
      --Rs: 8px;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    button,input,textarea{font:inherit;border:0;outline:0;color:inherit;cursor:pointer;background:0}
    body{
      overflow:hidden;height:100vh;
      font-family:'Noto Sans SC',-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
      background:var(--bg);color:var(--text);
    }
    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:4px}

    /* ═══ Ambient ═══ */
    #ambientBg{position:fixed;inset:0;z-index:0;pointer-events:none}

    /* ═══ Layout ═══ */
    .app{position:relative;z-index:1;display:grid;grid-template-columns:360px minmax(0,1fr);height:100vh}
    .sidebar{
      display:flex;flex-direction:column;gap:1.2rem;padding:1.6rem 1.4rem;overflow-y:auto;
      background:linear-gradient(180deg,rgba(14,17,26,.98),rgba(8,9,15,.99));
      border-right:1px solid var(--line);
    }
    .main{display:flex;flex-direction:column;min-height:0;padding:1rem 1.2rem;gap:.7rem;overflow:hidden}

    /* ═══ Brand ═══ */
    .brand{display:flex;align-items:center;gap:.7rem}
    .brand-orb{
      width:2.2rem;height:2.2rem;border-radius:50%;position:relative;
      background:conic-gradient(from 0deg,#7b6cf6,#5ea2ff,#4dd8e8,#7b6cf6);
      box-shadow:0 0 20px rgba(123,108,246,.35);
      animation:orbRotate 10s linear infinite;
    }
    .brand-orb::after{content:'';position:absolute;inset:4px;border-radius:50%;background:radial-gradient(circle at 35% 30%,rgba(255,255,255,.25),transparent 55%)}
    @keyframes orbRotate{to{rotate:360deg}}
    .brand h1{font-size:1.3rem;font-weight:900;letter-spacing:-.01em}
    .brand small{display:block;color:var(--text3);font-size:.68rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase}

    .sep{height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.06),transparent)}

    /* ═══ Input ═══ */
    .input-area{display:flex;flex-direction:column;gap:.4rem}
    .input-area h2{font-size:.82rem;font-weight:700;color:var(--text3)}
    .input-box{
      position:relative;padding:.8rem;border-radius:var(--R);
      background:var(--surface2);border:1px solid var(--line);
      box-shadow:0 8px 32px rgba(0,0,0,.25),inset 0 1px 0 rgba(255,255,255,.03);
      transition:border-color .3s,box-shadow .3s;
    }
    .input-box:focus-within{border-color:rgba(123,108,246,.3);box-shadow:0 8px 32px rgba(0,0,0,.25),0 0 0 3px rgba(123,108,246,.06)}
    .input-box textarea{width:100%;min-height:3.8rem;resize:none;background:transparent;font-size:.9rem;line-height:1.5}
    .input-box textarea::placeholder{color:var(--text3)}
    .char-ct{position:absolute;right:3rem;bottom:.7rem;color:var(--text3);font-size:.68rem}
    .go-btn{
      position:absolute;right:.5rem;bottom:.45rem;width:2rem;height:2rem;border-radius:50%;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      box-shadow:0 4px 14px rgba(123,108,246,.35);
      display:grid;place-items:center;font-size:1.05rem;
      transition:transform .2s cubic-bezier(.34,1.56,.64,1),box-shadow .2s;
    }
    .go-btn:hover{transform:scale(1.1);box-shadow:0 6px 20px rgba(123,108,246,.5)}
    .go-btn:active{transform:scale(.92)}
    .go-btn:disabled{opacity:.3;transform:none;cursor:not-allowed;box-shadow:none}
    .go-btn.planning{animation:goPulse 1.6s ease-in-out infinite}
    @keyframes goPulse{0%,100%{box-shadow:0 4px 14px rgba(123,108,246,.35)}50%{box-shadow:0 4px 28px rgba(123,108,246,.6)}}

    /* ═══ Tags ═══ */
    .tags{display:grid;grid-template-columns:repeat(2,1fr);gap:.35rem}
    .tag{
      padding:.4rem .55rem;border-radius:var(--Rs);
      background:rgba(255,255,255,.02);border:1px solid var(--line);
      font-size:.74rem;font-weight:700;transition:all .2s;
    }
    .tag:hover{background:rgba(123,108,246,.06);border-color:rgba(123,108,246,.2);transform:translateY(-1px)}
    .tag.on{background:rgba(123,108,246,.12);border-color:rgba(123,108,246,.35);box-shadow:0 0 14px rgba(123,108,246,.08)}

    /* ═══ Mode ═══ */
    .mode-toggle{display:flex;gap:3px;background:rgba(255,255,255,.02);border-radius:var(--Rs);padding:3px;border:1px solid var(--line)}
    .mode-btn{flex:1;padding:.35rem;border-radius:6px;font-size:.7rem;font-weight:700;text-align:center;transition:all .2s}
    .mode-btn:hover{background:rgba(255,255,255,.03)}
    .mode-btn.on{background:rgba(123,108,246,.18);box-shadow:0 0 10px rgba(123,108,246,.1)}

    .sidebar-footer{margin-top:auto}
    .sidebar-footer p{color:var(--text3);font-size:.68rem;line-height:1.6}

    /* ═══ Agent Workbench ═══ */
    .agent-section{flex:0 0 auto}
    .agent-section h2{font-size:.78rem;font-weight:800;color:var(--text3);margin-bottom:.5rem;display:flex;align-items:center;gap:.5rem}
    .agent-timer{font-size:.68rem;font-weight:600;color:var(--text3);font-variant-numeric:tabular-nums}

    /* Pipeline layout */
    .agent-pipeline{display:flex;flex-direction:column;gap:0}
    .agent-stage{display:flex;align-items:center;gap:.3rem}
    .agent-stage-cards{display:flex;gap:.35rem;flex:1;flex-wrap:wrap}
    #stageCards_0 .agent-card,
    #stageCards_2 .agent-card,
    #stageCards_3 .agent-card{flex:1 1 calc(50% - .35rem)}
    #stageCards_3 .agent-card{flex:1 1 100%}
    #stageCards_1 .agent-card{flex:1 1 calc(33% - .35rem);min-width:90px}
    .agent-arrow{
      display:flex;align-items:center;justify-content:center;
      height:1.2rem;color:var(--text3);font-size:.65rem;
      opacity:.15;transition:opacity .4s,color .4s;
    }
    .agent-arrow.active{opacity:1;color:var(--accent)}
    .agent-arrow.done{opacity:.4;color:var(--green)}
    .agent-arrow svg{width:.9rem;height:.9rem}
    .agent-arrow svg path{fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round}
    .agent-arrow.active svg path{stroke-dasharray:4 2;animation:arrowDash .6s linear infinite}
    @keyframes arrowDash{to{stroke-dashoffset:-6}}

    /* ── Agent Card — Badge Style ── */
    .agent-card{
      position:relative;overflow:hidden;
      padding:.45rem .55rem .35rem;border-radius:10px;
      background:var(--surface);border:1px solid var(--line);
      transition:all .35s cubic-bezier(.25,.46,.45,.94);
      flex:1;min-width:0;min-height:2.4rem;
    }
    .agent-card::before{
      content:'';position:absolute;top:0;left:0;bottom:0;width:3px;
      background:var(--agent-color,var(--accent));
      opacity:.3;transition:opacity .4s,background .4s;
    }
    /* ── idle: dimmed, waiting ── */
    .agent-card.idle{
      opacity:.18;filter:grayscale(.6) brightness(.7);
      pointer-events:none;
    }
    /* ── active: glowing, working ── */
    .agent-card.active{
      opacity:1;filter:none;
      border-color:color-mix(in srgb,var(--agent-color,var(--accent2)) 40%,transparent);
      transform:translateY(-2px) scale(1.02);
      box-shadow:0 4px 24px rgba(0,0,0,.3),
        0 0 18px color-mix(in srgb,var(--agent-color,var(--accent2)) 18%,transparent),
        inset 0 1px 0 color-mix(in srgb,var(--agent-color,var(--accent2)) 8%,transparent);
    }
    .agent-card.active::before{opacity:1}
    /* ── done: completed ── */
    .agent-card.done{
      opacity:1;filter:none;
      border-color:color-mix(in srgb,var(--green) 25%,transparent);
    }
    .agent-card.done::before{opacity:.7;background:var(--green)}

    /* Badge avatar */
    .agent-badge{
      width:1.8rem;height:1.8rem;border-radius:50%;
      display:grid;place-items:center;
      font-size:.9rem;line-height:1;
      background:color-mix(in srgb,var(--agent-color,var(--accent)) 10%,transparent);
      border:2px solid color-mix(in srgb,var(--agent-color,var(--accent)) 18%,transparent);
      transition:border-color .3s,box-shadow .3s,background .3s;
      flex-shrink:0;
    }
    .agent-card.active .agent-badge{
      border-color:color-mix(in srgb,var(--agent-color,var(--accent2)) 55%,transparent);
      background:color-mix(in srgb,var(--agent-color,var(--accent2)) 15%,transparent);
      box-shadow:0 0 0 3px color-mix(in srgb,var(--agent-color,var(--accent2)) 12%,transparent);
      animation:badgeRing 2s ease-in-out infinite;
    }
    .agent-card.done .agent-badge{
      border-color:color-mix(in srgb,var(--green) 45%,transparent);
      background:rgba(62,232,137,.08);
    }
    @keyframes badgeRing{
      0%,100%{box-shadow:0 0 0 3px color-mix(in srgb,var(--agent-color,var(--accent2)) 10%,transparent),0 0 8px color-mix(in srgb,var(--agent-color,var(--accent2)) 10%,transparent)}
      50%{box-shadow:0 0 0 6px color-mix(in srgb,var(--agent-color,var(--accent2)) 5%,transparent),0 0 14px color-mix(in srgb,var(--agent-color,var(--accent2)) 20%,transparent)}
    }

    .agent-head{display:flex;align-items:center;gap:.4rem;position:relative;z-index:1}
    .agent-info{flex:1;min-width:0}
    .agent-name{font-size:.72rem;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
    .agent-role{font-size:.55rem;color:var(--text3);font-weight:600}

    /* Status ring */
    .agent-status{
      width:.35rem;height:.35rem;border-radius:50%;
      background:var(--text3);transition:all .3s;flex-shrink:0;
    }
    .agent-card.active .agent-status{
      background:var(--agent-color,var(--accent2));
      box-shadow:0 0 6px var(--agent-color,var(--accent2));
      animation:statusPulse 1.5s ease-in-out infinite;
    }
    .agent-card.done .agent-status{background:var(--green);box-shadow:0 0 5px var(--green)}
    @keyframes statusPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.4)}}

    .agent-thinking{
      position:relative;z-index:1;
      font-size:.58rem;color:var(--text2);line-height:1.35;
      max-height:0;overflow:hidden;opacity:0;
      transition:max-height .4s,opacity .3s,margin .3s;margin-top:0;
      padding-left:.1rem;
    }
    .agent-card.active .agent-thinking{max-height:35px;opacity:1;margin-top:.2rem}
    .agent-thinking .dots span{animation:dotJump 1.4s ease-in-out infinite;display:inline-block;font-size:.5rem}
    .agent-thinking .dots span:nth-child(2){animation-delay:.12s}
    .agent-thinking .dots span:nth-child(3){animation-delay:.24s}
    @keyframes dotJump{0%,60%,100%{opacity:.25;transform:translateY(0)}30%{opacity:1;transform:translateY(-2px)}}

    .agent-result{
      position:relative;z-index:1;
      font-size:.54rem;color:var(--green);font-weight:700;
      max-height:0;overflow:hidden;opacity:0;
      transition:max-height .4s,opacity .3s,margin .3s;margin-top:0;
    }
    .agent-card.done .agent-result{max-height:24px;opacity:1;margin-top:.15rem}

    /* ═══ Phase Strip ═══ */
    .phase-strip{
      flex:0 0 auto;display:flex;align-items:center;gap:.4rem;
      padding:.25rem .5rem;border-radius:6px;
      background:rgba(255,255,255,.015);border:1px solid var(--line);
      font-size:.65rem;color:var(--text3);font-weight:600;
      min-height:1.5rem;
    }
    .phase-text{white-space:nowrap}
    .phase-text.typing::after{
      content:'';display:inline-block;width:1.5px;height:.7em;
      background:var(--accent);margin-left:2px;vertical-align:middle;
      animation:cursorBlink 1s steps(2) infinite;
    }
    @keyframes cursorBlink{0%{opacity:1}50%{opacity:0}}

    /* ═══ Emotion Curve ═══ */
    .curve-bar{
      flex:0 0 auto;padding:.45rem .7rem;border-radius:var(--Rs);
      background:var(--surface);border:1px solid var(--line);
      display:flex;flex-direction:column;gap:.2rem;
    }
    .curve-header{display:flex;align-items:center;gap:.6rem;flex:1}
    .curve-header h3{font-size:.72rem;font-weight:800;color:var(--text3);white-space:nowrap;flex-shrink:0}
    .curve-svg{flex:1;min-width:0;height:3rem;overflow:visible}
    .curve-labels{display:flex;justify-content:space-between;font-size:.56rem;color:var(--text3);padding:0 1.2rem}

    /* ═══ Route ═══ */
    .route-area{flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden}
    .route-board{
      flex:1;min-height:0;overflow-y:auto;padding:.5rem;
      border-radius:var(--Rs);background:var(--surface);border:1px solid var(--line);
    }
    .route-empty{
      display:grid;height:100%;min-height:12rem;place-items:center;
      color:var(--text3);text-align:center;line-height:1.8;font-size:.82rem;
    }
    .route-empty .empty-icon{font-size:2rem;margin-bottom:.3rem;opacity:.35}
    .route-list{display:grid;gap:.35rem}

    /* ── POI Card (Narrative Style) ── */
    .poi-row{
      display:grid;grid-template-columns:3.2rem 1fr;gap:.35rem;
      animation:poiSlide .5s cubic-bezier(.25,.46,.45,.94) both;
    }
    @keyframes poiSlide{
      from{opacity:0;transform:translateY(14px) scale(.98)}
      to{opacity:1;transform:translateY(0) scale(1)}
    }

    .t-cell{position:relative;padding-top:.4rem;text-align:right;font-size:.72rem;font-weight:800;font-variant-numeric:tabular-nums}
    .t-cell small{display:block;margin-top:.12rem;font-size:.56rem;color:var(--text3);font-weight:600}
    .t-cell::after{
      content:'';position:absolute;top:.7rem;right:-.25rem;
      width:.45rem;height:.45rem;border-radius:50%;
      background:var(--c,var(--accent));
      box-shadow:0 0 0 2.5px var(--bg),0 0 8px color-mix(in srgb,var(--c,var(--accent)) 40%,transparent);
      z-index:1;
    }

    .poi-card{
      padding:.55rem .65rem;border-radius:8px;
      border-left:3px solid var(--c,var(--accent));
      background:linear-gradient(135deg,rgba(20,24,44,.92),rgba(12,15,30,.95));
      transition:transform .2s,box-shadow .2s;
    }
    .poi-card:hover{transform:translateX(3px);box-shadow:0 2px 12px rgba(0,0,0,.2)}

    .poi-top{display:flex;align-items:flex-start;justify-content:space-between;gap:.4rem;margin-bottom:.2rem}
    .poi-name{font-size:.84rem;font-weight:900;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0}
    .poi-price{font-size:.78rem;font-weight:900;color:var(--c,var(--orange));white-space:nowrap;flex-shrink:0}
    .poi-meta-row{display:flex;flex-wrap:wrap;align-items:center;gap:.15rem .4rem;font-size:.62rem;color:var(--text3);font-weight:700;margin-bottom:.2rem}
    .poi-badge{
      padding:.02rem .25rem;border-radius:999px;font-size:.56rem;font-weight:800;
      background:color-mix(in srgb,var(--c,var(--accent)) 15%,transparent);
      color:var(--c,var(--accent));
    }

    /* Narrative text - the storytelling part */
    .poi-narr{
      font-size:.72rem;line-height:1.55;color:var(--text2);
      padding:.35rem .4rem;margin:.2rem 0;
      border-radius:6px;
      background:rgba(255,255,255,.015);
      border-left:2px solid color-mix(in srgb,var(--c,var(--accent)) 30%,transparent);
      font-style:italic;
    }

    .poi-tags{display:flex;flex-wrap:wrap;gap:.1rem;margin-top:.15rem}
    .poi-tags span{
      padding:.02rem .22rem;border-radius:3px;
      background:rgba(255,255,255,.03);font-size:.55rem;color:var(--text3);
    }

    /* ── Travel ── */
    .travel-row{display:grid;grid-template-columns:3.2rem 1fr;gap:.35rem;padding:.08rem 0}
    .travel-row .t-cell{visibility:hidden}
    .travel-line{height:1px;position:relative;background:linear-gradient(90deg,transparent,rgba(255,255,255,.06),transparent)}
    .travel-line span{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);background:var(--surface);padding:0 .3rem;font-size:.56rem;color:var(--text3);white-space:nowrap;font-weight:600}

    /* ═══ Bottom ═══ */
    .bottom{flex:0 0 auto;display:grid;grid-template-columns:1fr 190px;gap:.5rem}
    .composer{
      display:flex;flex-direction:column;gap:.3rem;
      padding:.45rem .5rem;border-radius:var(--Rs);
      background:var(--surface);border:1px solid var(--line);
    }
    .comp-row{display:grid;grid-template-columns:1fr repeat(4,auto) 1.8rem;gap:.3rem;align-items:center}
    .comp-input{
      padding:0 .6rem;height:1.8rem;border-radius:999px;
      background:rgba(255,255,255,.02);border:1px solid var(--line);
      font-size:.76rem;transition:border-color .2s;
    }
    .comp-input:focus{border-color:rgba(123,108,246,.25)}
    .qb{
      padding:0 .45rem;height:1.8rem;border-radius:999px;
      background:rgba(255,255,255,.02);border:1px solid var(--line);
      font-size:.64rem;font-weight:700;transition:all .2s;
    }
    .qb:hover{background:rgba(123,108,246,.08);border-color:rgba(123,108,246,.2)}
    .send-b{
      width:1.8rem;height:1.8rem;border-radius:50%;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      display:grid;place-items:center;font-size:.85rem;
      box-shadow:0 3px 10px rgba(123,108,246,.25);
      transition:transform .2s;
    }
    .send-b:hover{transform:scale(1.05)}
    .send-b:disabled{opacity:.3;transform:none}

    .reply{min-height:.7rem;font-size:.66rem;font-weight:700;color:var(--text3);transition:color .3s}
    .reply.ok{color:var(--green)}
    .reply.err{color:#ff8a98}

    .budget{
      padding:.45rem .6rem;border-radius:var(--Rs);
      background:var(--surface);border:1px solid var(--line);
      display:flex;align-items:center;gap:.5rem;
    }
    .budget h3{font-size:.68rem;font-weight:700}
    .budget strong{font-size:.86rem;font-weight:900}
    .budget p{font-size:.58rem;color:var(--text3)}
    .ring{
      width:2.8rem;height:2.8rem;border-radius:50%;position:relative;
      background:conic-gradient(var(--accent) var(--deg,0deg),rgba(255,255,255,.03) 0);
      display:grid;place-items:center;font-weight:900;font-size:.62rem;
      transition:--deg .6s;
    }
    .ring::before{content:'';position:absolute;inset:.3rem;border-radius:50%;background:var(--bg)}
    .ring span{position:relative;z-index:1}

    /* ═══ Responsive ═══ */
    @media(max-width:1000px){
      .app{grid-template-columns:1fr}
      .sidebar{height:auto;max-height:35vh}
      body{overflow:auto}
      .agent-stage-cards{flex-wrap:wrap}
    }
  </style>
</head>
<body>
<canvas id="ambientBg"></canvas>
<div class="app">
  <!-- ═══ Sidebar ═══ -->
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-orb"></div>
      <div><h1>CityFlow</h1><small>智能城市漫游规划</small></div>
    </div>
    <div class="sep"></div>
    <div class="input-area">
      <h2>描述你的出行需求</h2>
      <div class="input-box">
        <textarea id="inp" maxlength="80" placeholder="周末想一个人安静走走..."></textarea>
        <span class="char-ct" id="charCt">0/80</span>
        <button class="go-btn" id="goBtn">→</button>
      </div>
    </div>
    <div class="tags">
      <button class="tag" data-v="周末想一个人安静走走，偏独处">⌂ 独处</button>
      <button class="tag" data-v="情侣约会浪漫一点，拍照喝咖啡">♡ 约会</button>
      <button class="tag" data-v="带孩子出去玩，轻松安全有休息点">☻ 亲子</button>
      <button class="tag" data-v="朋友聚餐热闹点，吃好喝好">♣ 聚餐</button>
    </div>
    <div class="mode-toggle">
      <button class="mode-btn on" id="modeMock" data-port="8002">🎭 Mock</button>
      <button class="mode-btn" id="modeReal" data-port="8003">🧠 Real</button>
    </div>
    <div class="sidebar-footer">
      <p>Mock 模式不消耗 Token。<br>Real 模式连接后端 DeepSeek。</p>
    </div>
  </aside>

  <!-- ═══ Main ═══ -->
  <div class="main">
    <section class="agent-section">
      <h2>MoE 智能体 <span class="agent-timer" id="agentTimer"></span></h2>

</div>

<script>
const $ = id => document.getElementById(id);

// ── Ambient Particles ──
(function(){
  const c=$('ambientBg'),ctx=c.getContext('2d');let W,H,ps=[];
  function rz(){W=c.width=innerWidth;H=c.height=innerHeight}
  rz();addEventListener('resize',rz);
  class P{constructor(){this.rz()}rz(){this.x=Math.random()*W;this.y=Math.random()*H;this.r=Math.random()*1+.3;this.dx=(Math.random()-.5)*.12;this.dy=(Math.random()-.5)*.08;this.a=Math.random()*.2+.04;this.h=Math.random()>.6?255:230}up(){this.x+=this.dx;this.y+=this.dy;if(this.x<-5||this.x>W+5||this.y<-5||this.y>H+5)this.rz()}dr(){ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,6.28);ctx.fillStyle=`hsla(${this.h},50%,65%,${this.a})`;ctx.fill()}}
  for(let i=0;i<50;i++)ps.push(new P);
  (function f(){ctx.clearRect(0,0,W,H);ps.forEach(p=>{p.up();p.dr()});for(let i=0;i<ps.length;i++)for(let j=i+1;j<ps.length;j++){const dx=ps[i].x-ps[j].x,dy=ps[i].y-ps[j].y,d=dx*dx+dy*dy;if(d<16000){ctx.beginPath();ctx.moveTo(ps[i].x,ps[i].y);ctx.lineTo(ps[j].x,ps[j].y);ctx.strokeStyle=`rgba(123,108,246,${.025*(1-d/16000)})`;ctx.stroke()}}requestAnimationFrame(f)})();
})();

// ── State ──
let PORT = 8002;
const S = { routeId:null, steps:[], fullRoute:null, planning:false, done:false, abort:null, t0:0, agents:{} };

// ── Mode ──
$('modeMock').onclick=()=>{PORT=8002;$('modeMock').classList.add('on');$('modeReal').classList.remove('on')};
$('modeReal').onclick=()=>{PORT=8003;$('modeReal').classList.add('on');$('modeMock').classList.remove('on')};

// ── Helpers ──
const txt=(v,fb='')=>(v==null||v==='')?fb:String(v);
const num=v=>{const n=Number(v||0);return Number.isFinite(n)?Math.round(n):0};
const elapsed=()=>{const s=Math.floor((Date.now()-S.t0)/1000);return`${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`};

// Emotion mapping for curve
const EMOTIONS = {
  '运动健身': { label:'活力', emoji:'⚡', v:.85 },
  '拍照出片': { label:'惊喜', emoji:'✨', v:.75 },
  '自然风光': { label:'宁静', emoji:'🌿', v:.55 },
  '休闲放松': { label:'惬意', emoji:'☁️', v:.35 },
  '咖啡': { label:'舒适', emoji:'☕', v:.3 },
  '文艺': { label:'灵感', emoji:'🎭', v:.65 },
  '怀旧': { label:'回忆', emoji:'📻', v:.45 },
  '公园': { label:'清新', emoji:'🍃', v:.5 },
  '约会': { label:'甜蜜', emoji:'💕', v:.6 },
};
function getEmotion(tags) {
  for (const t of tags || []) if (EMOTIONS[t]) return EMOTIONS[t];
  return { label:'探索', emoji:'🧭', v:.5 };
}

function tagColor(t) {
  const m = {'自然风光':'#3ee889','公园':'#3ee889','休闲放松':'#5ea2ff','拍照出片':'#ff6b9d','运动健身':'#3ee889','文化':'#9b6dff','美食':'#ffa54d','咖啡':'#c49a6a','文艺':'#9b6dff','怀旧':'#b88a5a'};
  return m[t]||'#8b93b0';
}
function poiColor(poi) {
  const tags = [...(poi?.tags || []), ...(poi?._scene_tags || [])];
  for (const t of tags) { const c = tagColor(t); if (c !== '#8b93b0') return c; }
  const c = poi?.category || '';
  if (c.includes('餐') || c.includes('咖啡')) return '#ffa54d';
  if (c.includes('公园')) return '#3ee889';
  return '#9b6dff';
}

// ── Agent Pipeline ──
// All agents definition — pre-created in pipeline, idle until activated
const AGENT_STAGE = {
  'intent_parser': 0, 'rule_guard': 0, 'expert_router': 0,
  'poi_expert': 1, 'poi': 1,
  'food_expert': 1, 'food': 1,
  'local_expert': 1, 'local_expert_agent': 1,
  'hotel_expert': 1, 'hotel': 1,
  'traffic_expert': 1, 'traffic': 1,
  'weather_expert': 1, 'weather': 1,
  'destination_expert': 1, 'destination': 1,
  'insurance': 1,
  'negotiation': 1,
  'review': 2,
  'budget_hacker': 2,
  'synthesizer': 3,
};
const ALL_AGENTS = [
  {agent:'rule_guard',name:'意图解析',icon:'🧠',role:'需求理解',color:'#ff5368'},
  {agent:'expert_router',name:'路由器',icon:'📡',role:'专家调度',color:'#7b6cf6'},
  {agent:'poi',name:'POI专家',icon:'🏛',role:'景点筛选',color:'#51aef9'},
  {agent:'food',name:'美食专家',icon:'🍜',role:'餐饮推荐',color:'#ff9b54'},
  {agent:'hotel',name:'住宿专家',icon:'🏨',role:'住宿推荐',color:'#4da6ff'},
  {agent:'traffic',name:'交通专家',icon:'🚗',role:'交通规划',color:'#4dd8e8'},
  {agent:'weather',name:'天气专家',icon:'🌤',role:'天气分析',color:'#ffa54d'},
  {agent:'local_expert',name:'本地向导',icon:'🗺',role:'隐藏宝藏',color:'#7edc95'},
  {agent:'insurance',name:'保险专家',icon:'🛡',role:'风险评估',color:'#9b6dff'},
  {agent:'negotiation',name:'协商引擎',icon:'⚖️',role:'冲突调解',color:'#ff6b9d'},
  {agent:'review',name:'审查员',icon:'🔍',role:'质量校验',color:'#c49a6a'},
  {agent:'budget_hacker',name:'预算师',icon:'💰',role:'预算优化',color:'#ffcc00'},
  {agent:'synthesizer',name:'综合师',icon:'✨',role:'路线组装',color:'#ff5a88'},
];

function agentCard(a) {
  const el = document.createElement('div');
  el.className = 'agent-card';
  el.id = 'ag_' + a.agent;
  el.style.setProperty('--agent-color', a.color || '#5ea2ff');
  el.innerHTML = `
    <div class="agent-head">
      <div class="agent-badge">${a.icon || '🤖'}</div>
      <div class="agent-info">
        <div class="agent-name">${a.name || a.agent}</div>
        <div class="agent-role">${a.role || ''}</div>
      </div>
      <div class="agent-status"></div>
    </div>
    <div class="agent-thinking"><span class="ag-think-text"></span> <span class="dots"><span>·</span><span>·</span><span>·</span></span></div>
    <div class="agent-result"></div>`;
  return el;
}

function ensureAgentCard(data) {
  let el = $('ag_' + data.agent);
  if (!el) {
    el = agentCard(data);
    const stageIdx = AGENT_STAGE[data.agent] ?? 0;
    const container = $('stageCards_' + stageIdx);
    if (container) {
      el.classList.add('idle');
      container.appendChild(el);
    }
  }
  return el;
}

// Arrow animation between stages
function activateArrow(stageIdx) {
  const arrow = $('arrow_' + stageIdx);
  if (arrow) arrow.classList.add('active');
}
function doneArrow(stageIdx) {
  const arrow = $('arrow_' + stageIdx);
  if (arrow) { arrow.classList.remove('active'); arrow.classList.add('done'); }
}

function resetPipeline() {
  for (let i = 0; i < 4; i++) {
    const c = $('stageCards_' + i);
    if (c) c.innerHTML = '';
    const a = $('arrow_' + i);
    if (a) { a.classList.remove('active','done'); }
  }
  // Pre-create ALL agent cards in idle state — "亮灯" starts here
  ALL_AGENTS.forEach(def => {
    const card = agentCard(def);
    card.classList.add('idle');
    const stageIdx = AGENT_STAGE[def.agent] ?? 0;
    const container = $('stageCards_' + stageIdx);
    if (container) container.appendChild(card);
  });
}

// ── Phase ──
function setPhase(msg) {
  const el = $('phaseText');
  el.textContent = msg;
  el.classList.add('typing');
}

// ── UI ──
function setReply(msg,tone=''){const r=$('reply');r.textContent=msg;r.className='reply'+(tone?' '+tone:'')}
function setPlanning(on){
  S.planning=on;const btn=$('goBtn');btn.disabled=on;btn.textContent=on?'…':'→';
  btn.classList.toggle('planning',on);
}
function updateBudget(used,limit){
  const pct=limit?Math.min(100,Math.round(used/limit*100)):0;
  $('bUsed').textContent=used;$('bLimit').textContent=limit;
  $('bPct').textContent=pct+'%';$('ring').style.setProperty('--deg',(pct*3.6)+'deg');
}

// ── Curve with Labels ──
function renderCurve() {
  const svg = $('curveSvg');
  const labels = $('curveLabels');
  svg.innerHTML = ''; labels.innerHTML = '';
  if (!S.steps.length) return;
  const PX = 20, W = 900, H = 40, n = S.steps.length;
  const pts = S.steps.map((step, i) => {
    const tags = step.poi?.tags || [];
    const emo = getEmotion(tags);
    let v = emo.v;
    if (i === 0) v *= .8;
    if (i === n - 1) v *= .7;
    const x = n === 1 ? PX + W / 2 : PX + (i / (n - 1)) * W;
    const y = (1 - v) * H;
    return { x, y, c: poiColor(step.poi), name: step.poi?.name || '', emo };
  });

  const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
  const g = document.createElementNS('http://www.w3.org/2000/svg', 'linearGradient');
  g.id = 'cs'; g.setAttribute('x1', '0'); g.setAttribute('x2', '1');
  pts.forEach((p, i) => {
    const s = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
    s.setAttribute('offset', (i / Math.max(1, n - 1) * 100) + '%'); s.setAttribute('stop-color', p.c); g.appendChild(s);
  });
  const fg = g.cloneNode(true); fg.id = 'cf';
  fg.querySelectorAll('s'+'top').forEach(s => s.setAttribute('stop-opacity', '.1'));
  defs.appendChild(g); defs.appendChild(fg); svg.appendChild(defs);

  const d = pts.map((p, i) =>
    i === 0 ? `M${p.x} ${p.y}` : `C${pts[i-1].x+(p.x-pts[i-1].x)*.4} ${pts[i-1].y} ${pts[i-1].x+(p.x-pts[i-1].x)*.6} ${p.y} ${p.x} ${p.y}`
  ).join(' ');
  const fp = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  fp.setAttribute('d', d + ` L${pts.at(-1).x} ${H} L${pts[0].x} ${H} Z`); fp.setAttribute('fill', 'url(#cf)'); svg.appendChild(fp);
  const sp = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  sp.setAttribute('d', d); sp.setAttribute('fill', 'none'); sp.setAttribute('stroke', 'url(#cs)'); sp.setAttribute('stroke-width', '2'); sp.setAttribute('stroke-linecap', 'round'); svg.appendChild(sp);
  pts.forEach(p => {
    const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    c.setAttribute('cx', p.x); c.setAttribute('cy', p.y); c.setAttribute('r', '3');
    c.setAttribute('fill', p.c); c.style.filter = `drop-shadow(0 0 4px ${p.c})`; svg.appendChild(c);
    // Emotion label
    const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    t.setAttribute('x', p.x); t.setAttribute('y', p.y - 8);
    t.setAttribute('text-anchor', 'middle'); t.setAttribute('fill', p.c);
    t.setAttribute('font-size', '8'); t.setAttribute('font-weight', '700');
    t.textContent = p.emo.emoji; svg.appendChild(t);
  });

  // Bottom labels with POI names
  labels.innerHTML = pts.map(p =>
    `<span style="color:${p.c}">${p.emo.emoji} ${p.name.slice(0, 4)}</span>`
  ).join('');
}

// ── POI Rendering ──
function clearEmpty(){const e=$('routeList').querySelector('.route-empty');if(e)e.remove()}

function renderTravel(travel) {
  if (!travel) return;
  const d = travel.distance_m >= 1000 ? (travel.distance_m / 1000).toFixed(1) + 'km' : travel.distance_m + 'm';
  const t = travel.time_min ? ` · ${travel.time_min}min` : '';
  const row = document.createElement('div');
  row.className = 'travel-row';
  row.innerHTML = `<div class="t-cell"></div><div class="travel-line"><span>${d}${t}</span></div>`;
  $('routeList').appendChild(row);
}

function renderStep(step) {
  if (!step?.poi) return;
  clearEmpty(); S.steps.push(step);
  const poi = step.poi, c = poiColor(poi);
  const tags = [...(poi.tags || []), ...(step.scene_tags || []), ...(poi._scene_tags || [])].filter(Boolean);
  const emo = getEmotion([...(poi.tags || []), ...(step.scene_tags || []), ...(poi._scene_tags || [])]);

  const row = document.createElement('div');
  row.className = 'poi-row'; row.style.setProperty('--c', c);

  // Build narrative with emotion context
  const narrative = step.narrative || '';
  const emotionLine = narrative
    ? `<div class="poi-narr">${narrative}</div>`
    : '';

  row.innerHTML = `
    <div class="t-cell" style="--c:${c}">${txt(step.arrival_time,'--')}<small>${txt(step.departure_time,'--')}</small></div>
    <div class="poi-card" style="--c:${c}">
      <div class="poi-top">
        <span class="poi-name">${txt(poi.name,'未命名')}</span>
        <span class="poi-price">${poi.avg_price ? '¥'+num(poi.avg_price) : '免费'}</span>
      </div>
      <div class="poi-meta-row">
        ${step.emotion_design ? `<span class="poi-badge" style="--c:${c}">${emo.emoji} ${step.emotion_design}</span>` : ''}
        ${txt(poi.category,'')}
        ${poi.rating ? ` ★${Number(poi.rating).toFixed(1)}` : ''}
        ${poi.avg_stay_min ? ` · 停留${poi.avg_stay_min}min` : ''}
        ${poi.business_hours ? ` · ${poi.business_hours}` : ''}
      </div>
      ${emotionLine}
      ${tags.length ? `<div class="poi-tags">${tags.slice(0,5).map(t=>`<span style="color:${tagColor(t)}">${t}</span>`).join('')}</div>` : ''}
    </div>`;
  $('routeList').appendChild(row);
  row.scrollIntoView({ behavior:'smooth', block:'nearest' });
  renderCurve();
}

function renderClosing() {
  const last = S.steps[S.steps.length - 1];
  const row = document.createElement('div');
  row.className = 'poi-row'; row.style.setProperty('--c','#555e7a');
  row.innerHTML = `<div class="t-cell" style="--c:#555e7a">${last?.departure_time||'--'}<small>☁</small></div><div class="poi-card" style="--c:#555e7a;border-left-color:#555e7a"><div style="color:var(--text3);font-size:.74rem;font-style:italic;padding:.2rem 0">希望这段旅程为你带来片刻宁静。</div></div>`;
  $('routeList').appendChild(row);
}

// ── Timer ──
let timerInterval = null;
function startTimer(){S.t0=Date.now();clearInterval(timerInterval);timerInterval=setInterval(()=>{if(!S.planning)return;$('agentTimer').textContent=elapsed()},500)}
function stopTimer(){clearInterval(timerInterval)}

// ── SSE ──
function onPhase(data){if(data.message)setPhase(data.message)}

function onAgentStart(data){
  const card = ensureAgentCard(data);
  // Update visual from SSE data
  if (data.icon) card.querySelector('.agent-badge').textContent = data.icon;
  if (data.name) card.querySelector('.agent-name').textContent = data.name;
  if (data.role) card.querySelector('.agent-role').textContent = data.role;
  if (data.color) card.style.setProperty('--agent-color', data.color);
  // Light up! idle → active
  card.classList.remove('idle','done');
  card.classList.add('active');
  const stageIdx = AGENT_STAGE[data.agent] ?? 0;
  if (stageIdx > 0) activateArrow(stageIdx - 1);
}
function onAgentThinking(data){
  const card=ensureAgentCard({agent:data.agent});
  const t=card.querySelector('.ag-think-text');
  if(t)t.textContent=data.text;
}
function onAgentResult(data){
  const card=$('ag_'+data.agent);
  if(!card)return;
  card.classList.remove('idle','active');
  card.classList.add('done');
  const resultEl=card.querySelector('.agent-result');
  resultEl.textContent='✓ '+(data.summary||'完成');
  const stageIdx = AGENT_STAGE[data.agent] ?? 0;
  if (stageIdx > 0) doneArrow(stageIdx - 1);
}

function onStep(data){renderStep(data)}

function onDone(data){
  S.routeId=data.route_id;S.fullRoute=data.full_route||{};
  const route=S.fullRoute.route||[];
  // If step events already rendered these POIs, don't re-render — just patch travel info
  if(route.length && S.steps.length===0){
    // No step events received, render from full_route
    route.forEach((rs,i)=>{
      if(rs.travel_from_prev)renderTravel(rs.travel_from_prev);
      renderStep({index:i+1,poi:rs.poi,arrival_time:rs.arrival_time,departure_time:rs.departure_time,narrative:rs.narrative||'',emotion_design:rs.emotion_design||'',scene_tags:rs.scene_tags||[]});
    });
  }
  renderClosing();
  const tc=S.fullRoute.total_cost||{};
  updateBudget(num(tc.budget_used),tc.budget_limit||200);
  const ver=data.version?` · ${data.version}`:'';
  setReply(`规划完成${ver} · ${S.steps.length}站 · ${elapsed()}`,'ok');
  $('phaseText').classList.remove('typing');
  setPhase('规划完成 ✓');
  S.done=true;setPlanning(false);stopTimer();
}
function onError(data){setReply(data.error||'规划失败','err');setPhase('出错了');S.done=true;setPlanning(false);stopTimer()}

function handleEvent(type,data){
  if(type==='phase')return onPhase(data);
  if(type==='agent_start')return onAgentStart(data);
  if(type==='agent_thinking')return onAgentThinking(data);
  if(type==='agent_result')return onAgentResult(data);
  if(type==='step')return onStep(data);
  if(type==='done')return onDone(data);
  if(type==='error')return onError(data);
  if(type==='debug_agents'){(data.agents||[]).forEach(aid=>ensureAgentCard({agent:aid,name:aid,icon:'🤖',role:'',color:'#5ea2ff'}))}
}

// Yield to browser rendering between events
function waitForFrame(){return new Promise(r=>requestAnimationFrame(r))}

// ── SSE Stream ──
async function parseSSE(chunk,buf){
  buf.s+=chunk;const msgs=buf.s.split(/\r?\n\r?\n/);buf.s=msgs.pop()||'';
  for(const msg of msgs){
    let type='message';const dl=[];
    for(const line of msg.split(/\r?\n/)){
      if(line.startsWith('event:'))type=line.slice(6).trim();
      if(line.startsWith('data:'))dl.push(line.slice(5).trimStart());
    }
    if(!dl.length)continue;
    try{handleEvent(type,JSON.parse(dl.join('\n')))}catch(e){console.error('SSE:',e)}
    await waitForFrame();  // Let browser render between events
  }
}

async function submitPlan(input){
  if(S.planning)return;
  S.routeId=null;S.steps=[];S.fullRoute=null;S.done=false;S.agents={};
  $('routeList').innerHTML='<div class="route-empty"><p>Agent 工作中...</p></div>';
  resetPipeline();
  setReply('');updateBudget(0,200);setPlanning(true);startTimer();
  setPhase('正在理解你的需求...');
  S.abort=new AbortController();
  const timeout=setTimeout(()=>{if(!S.planning)return;S.abort?.abort();setPlanning(false);stopTimer();setReply('请求超时','err');setPhase('超时')},120_000);
  try{
    const res=await fetch(`http://localhost:${PORT}/api/plan`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({user_input:input}),signal:S.abort.signal,
    });
    if(!res.ok)throw new Error(`HTTP ${res.status}`);
    const reader=res.body.getReader(),dec=new TextDecoder(),buf={s:''};
    while(true){
      const{done,value}=await reader.read();
      if(done)break;
      await parseSSE(dec.decode(value,{stream:true}),buf);
      if(S.done){await reader.cancel();break}
    }
  }catch(e){
    if(e.name==='AbortError')return;
    console.error(e);setPlanning(false);stopTimer();
    setReply('连接失败 (端口 '+PORT+')','err');setPhase('连接失败');
  }finally{clearTimeout(timeout)}
}

// ── Dialogue ──
async function sendAdj(inst){
  if(!inst||!S.routeId){setReply('请先完成一次规划','err');return}
  $('dlgBtn').disabled=true;setReply('调整中...');
  try{
    const res=await fetch(`http://localhost:${PORT}/api/dialogue/${encodeURIComponent(S.routeId)}`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({instruction:inst}),
    });
    if(!res.ok)throw new Error(`HTTP ${res.status}`);
    const data=await res.json();setReply(data.reply||'已调整','ok');
    if(data.route?.route?.length){
      $('routeList').innerHTML='';S.steps=[];
      data.route.route.forEach((rs,i)=>renderStep({index:i+1,poi:rs.poi,arrival_time:rs.arrival_time,departure_time:rs.departure_time,narrative:rs.narrative||''}));
      renderClosing();S.fullRoute=data.route;
      const tc=data.route.total_cost||{};
      updateBudget(num(tc.budget_used),tc.budget_limit||200);
    }
  }catch(e){console.error(e);setReply('调整失败','err')}
  finally{$('dlgBtn').disabled=false}
}

// ── Bind ──
$('inp').addEventListener('input',()=>$('charCt').textContent=$('inp').value.length+'/80');
$('goBtn').addEventListener('click',()=>{const v=$('inp').value.trim();if(v)submitPlan(v)});
$('inp').addEventListener('keydown',e=>{if(e.key==='Enter'&&(e.ctrlKey||e.metaKey))$('goBtn').click()});
document.querySelectorAll('.tag').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.tag').forEach(t=>t.classList.remove('on'));
  b.classList.add('on');$('inp').value=b.dataset.v;$('charCt').textContent=b.dataset.v.length+'/80';
}));
document.querySelectorAll('.qb').forEach(b=>b.addEventListener('click',()=>sendAdj(b.dataset.a)));
$('dlgBtn').addEventListener('click',()=>{const v=$('dlgInp').value.trim();$('dlgInp').value='';sendAdj(v)});
$('dlgInp').addEventListener('keydown',e=>{if(e.key==='Enter')$('dlgBtn').click()});
</script>
