# CityFlow Alembic 配置
# 用法:
#   alembic upgrade head      -- 执行所有迁移
#   alembic downgrade -1      -- 回滚一步
#   alembic revision --autogenerate -m "描述"  -- 自动生成迁移

[alembic]
script_location = alembic
prepend_sys_path = .

# 数据库连接（由 env.py 从环境变量读取，此处留空）
sqlalchemy.url =

# 迁移文件命名模板
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# 每个迁移脚本使用事务
transaction_per_migration = false

[post_write_hooks]
hooks = ruff
ruff.type = exec
ruff.executable = ruff
ruff.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
